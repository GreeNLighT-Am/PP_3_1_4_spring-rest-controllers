<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Login page</title>

</head>
<body>

<div class="container-flex bg-light d-flex justify-content-center vh-100">
    <div class="col-3 d-flex flex-column mt-1 pt-1">

        <form class="form-signin mt-5" method="post" action="/login">
            <h2 class="form-signin-heading">Please sign in</h2>

            <!-- Сообщение об ошибке -->
            <div th:if="${param.error}" class="alert alert-danger">
                Неверные учётные данные. Попробуйте ещё раз.
            </div>

            <!-- Сообщение о выходе -->
            <div th:if="${param.logout}" class="alert alert-success">
                Вы успешно вышли из системы.
            </div>

            <p>
                <label for="username" class="visually-hidden">Username</label>
                <input type="text" id="username" name="email" class="form-control py-2" placeholder="Email address"
                       required autofocus>
            </p>
            <p>
                <label for="password" class="visually-hidden">Password</label>
                <input type="password" id="password" name="password" class="form-control py-2" placeholder="Password"
                       required>
            </p>
            <!-- CSRF-токен -->
            <input type="hidden" th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <button class="btn btn-lg btn-primary w-100" type="submit">Sign in</button>
        </form>

    </div>
</div>

</body>
</html>
