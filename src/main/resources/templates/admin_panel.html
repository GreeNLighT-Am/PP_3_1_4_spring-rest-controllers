<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <meta name="_csrf" th:content="${_csrf.token}"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <title>Admin panel</title>
</head>
<body>

<!--Навбар-->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3" style="height: 45px;">
    <div class="d-flex align-items-center justify-content-start w-100" id="userInfo">
        <!-- Заполняется через JS -->
    </div>
    <div class="navbar-nav d-flex">
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit" class="nav-link" style="background: none; border: none; cursor: pointer;">
                Logout
            </button>
        </form>
    </div>
</nav>

<div class="container-fluid vh-100">
    <div class="row vh-100">
        <div class="col-2 d-flex flex-column pt-3 px-0 mb-auto">
            <div class="flex-grow-1 d-flex flex-column">
                <a class="nav-link bg-primary text-white flex-fill text-start rounded" href="/admin">Admin</a>
                <a class="nav-link flex-fill text-start" href="/user">User</a>
            </div>
        </div>

        <div class="col-10 bg-light d-flex flex-column px-4">
            <h1 class="mb-3 mt-3">Admin panel</h1>

            <!--Табы-->
            <nav class="nav nav-tabs" id="nav-tab" role="tablist">
                <a class="nav-link active" id="users-table-tab" data-bs-toggle="tab" href="#users-table" role="tab">
                    Users table
                </a>
                <a class="nav-link" id="new-user-tab" data-bs-toggle="tab" href="#new-user" role="tab">
                    New user
                </a>
            </nav>

            <div class="tab-content" id="nav-tabContent">
                <!--Таб Users table-->
                <div class="tab-pane fade show active" id="users-table" role="tabpanel">
                    <div class="card">
                        <h5 class="card-header d-flex align-items-center">All users</h5>
                        <div class="card-body">
                            <table class="table card-body table-striped border-top">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th>Age</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Edit</th>
                                    <th>Delete</th>
                                </tr>
                                </thead>
                                <tbody id="usersTableBody">
                                <!-- Заполняется через JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!--Таб New user-->
                <div class="tab-pane fade" id="new-user" role="tabpanel">
                    <div class="card">
                        <h5 class="card-header d-flex align-items-center">Add new user</h5>
                        <div class="card-body">
                            <form id="newUserForm" class="container mx-auto text-center fw-bold" style="max-width: 400px;">
                                <div class="mb-3">
                                    <label for="newFirstName" class="form-label mb-0">First name</label>
                                    <input type="text" class="form-control py-1" id="newFirstName" name="firstName">
                                    <div class="text-danger small" data-error="firstName"></div>
                                </div>
                                <div class="mb-3">
                                    <label for="newLastName" class="form-label mb-0">Last name</label>
                                    <input type="text" class="form-control py-1" id="newLastName" name="lastName">
                                    <div class="text-danger small" data-error="lastName"></div>
                                </div>
                                <div class="mb-3">
                                    <label for="newAge" class="form-label mb-0">Age</label>
                                    <input type="number" class="form-control py-1" id="newAge" name="age">
                                    <div class="text-danger small" data-error="age"></div>
                                </div>
                                <div class="mb-3">
                                    <label for="newEmail" class="form-label mb-0">Email</label>
                                    <input type="email" class="form-control py-1" id="newEmail" name="email">
                                    <div class="text-danger small" data-error="email"></div>
                                </div>
                                <div class="mb-3">
                                    <label for="newPassword" class="form-label mb-0">Password</label>
                                    <input type="password" class="form-control py-1" id="newPassword" name="password">
                                    <div class="text-danger small" data-error="password"></div>
                                </div>
                                <div class="mb-3">
                                    <label for="newRole" class="form-label mb-0">Role</label>
                                    <select class="form-select py-1" id="newRole" name="roles" multiple size="2">
                                    </select>
                                    <div class="text-danger small" data-error="roles"></div>
                                </div>
                                <div class="mt-3">
                                    <button type="submit" class="btn btn-success">Add new user</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!--Модальное окно редактирования пользователя-->
<div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center fw-bold">
                <form id="editUserForm" class="mx-auto w-75">
                    <div class="mb-3">
                        <label for="editId" class="form-label mb-0">ID</label>
                        <input type="text" class="form-control py-1" id="editId" disabled>
                    </div>
                    <div class="mb-3">
                        <label for="editFirstName" class="form-label mb-0">First name</label>
                        <input type="text" class="form-control py-1" id="editFirstName">
                        <div class="text-danger small" data-error="firstName"></div>
                    </div>
                    <div class="mb-3">
                        <label for="editLastName" class="form-label mb-0">Last name</label>
                        <input type="text" class="form-control py-1" id="editLastName">
                        <div class="text-danger small" data-error="lastName"></div>
                    </div>
                    <div class="mb-3">
                        <label for="editAge" class="form-label mb-0">Age</label>
                        <input type="number" class="form-control py-1" id="editAge">
                        <div class="text-danger small" data-error="age"></div>
                    </div>
                    <div class="mb-3">
                        <label for="editEmail" class="form-label mb-0">Email</label>
                        <input type="email" class="form-control py-1" id="editEmail">
                        <div class="text-danger small" data-error="email"></div>
                    </div>
                    <div class="mb-3">
                        <label for="editPassword" class="form-label mb-0">Password</label>
                        <input type="password" class="form-control py-1" id="editPassword"
                               placeholder="Оставить пустым, чтобы не менять">
                        <div class="text-danger small" data-error="password"></div>
                    </div>
                    <div class="mb-3">
                        <label for="editRole" class="form-label mb-0">Role</label>
                        <select class="form-select py-1" id="editRole" multiple size="2">
                        </select>
                        <div class="text-danger small" data-error="roles"></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="saveEdit">Edit</button>
            </div>
        </div>
    </div>
</div>

<!--Модальное окно удаления пользователя-->
<div class="modal fade" id="deleteUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center fw-bold">
                <form id="deleteUserForm" class="mx-auto w-50">
                    <div class="mb-3">
                        <label for="deleteId" class="form-label mb-0">ID</label>
                        <input type="text" class="form-control py-1" id="deleteId" disabled>
                    </div>
                    <div class="mb-3">
                        <label for="deleteFirstName" class="form-label mb-0">First name</label>
                        <input type="text" class="form-control py-1" id="deleteFirstName" disabled>
                    </div>
                    <div class="mb-3">
                        <label for="deleteLastName" class="form-label mb-0">Last name</label>
                        <input type="text" class="form-control py-1" id="deleteLastName" disabled>
                    </div>
                    <div class="mb-3">
                        <label for="deleteAge" class="form-label mb-0">Age</label>
                        <input type="number" class="form-control py-1" id="deleteAge" disabled>
                    </div>
                    <div class="mb-3">
                        <label for="deleteEmail" class="form-label mb-0">Email</label>
                        <input type="email" class="form-control py-1" id="deleteEmail" disabled>
                    </div>
                    <div class="mb-3">
                        <label for="deleteRole" class="form-label mb-0">Role</label>
                        <select class="form-select py-1" id="deleteRole" multiple size="2" disabled>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-danger" id="deleteUser">Delete</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ============ Глобальные переменные и утилиты ============
    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

    let allUsers = [];
    let allRoles = [];
    let currentUser = null;

    // Настройка fetch с CSRF
    function fetchWithCsrf(url, options = {}) {
        const headers = {
            'Content-Type': 'application/json',
            [csrfHeader]: csrfToken,
            ...options.headers
        };
        return fetch(url, { ...options, headers });
    }

    // Загрузка начальных данных
    async function loadInitialData() {
        try {
            const [usersResponse, rolesResponse, currentUserResponse] = await Promise.all([
                fetchWithCsrf('/api/admin/users'),
                fetchWithCsrf('/api/admin/roles'),
                fetchWithCsrf('/api/admin/current-user')
            ]);

            allUsers = await usersResponse.json();
            allRoles = await rolesResponse.json();
            currentUser = await currentUserResponse.json();

            renderUserInfo();
            renderUsersTable();
            populateRoleSelects();
        } catch (error) {
            console.error('Error loading initial data:', error);
        }
    }

    // ============ Рендеринг навбара ============
    function renderUserInfo() {
        const userInfo = document.getElementById('userInfo');
        const roles = currentUser.roles.map(role => role.role.replace('ROLE_', '')).join(', ');
        userInfo.innerHTML = `
        <span class="text-white me-1 fs-5 fw-bold">${currentUser.email}</span>
        <span class="text-white me-1 fs-5">with roles:</span>
        <span class="text-white fs-5">${roles}</span>
    `;
    }

    // ============ Рендеринг таблицы пользователей ============
    function renderUsersTable() {
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = allUsers.map(user => `
        <tr>
            <td>${user.id}</td>
            <td>${user.firstName}</td>
            <td>${user.lastName}</td>
            <td>${user.age || ''}</td>
            <td>${user.email}</td>
            <td>${user.roles.map(role => role.role.replace('ROLE_', '')).join(', ')}</td>
            <td>
                <button type="button" class="btn btn-info text-white edit-btn" data-user-id="${user.id}">
                    Edit
                </button>
            </td>
            <td>
                <button type="button" class="btn btn-danger delete-btn" data-user-id="${user.id}">
                    Delete
                </button>
            </td>
        </tr>
    `).join('');

        // Добавляем обработчики событий
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', handleEditClick);
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', handleDeleteClick);
        });
    }

    // ============ Заполнение select'ов ролей ============
    function populateRoleSelects() {
        const roleSelects = ['newRole', 'editRole'];
        roleSelects.forEach(selectId => {
            const select = document.getElementById(selectId);
            select.innerHTML = allRoles.map(role => `
            <option value="${role.id}">${role.role.replace('ROLE_', '')}</option>
        `).join('');
        });
    }

    // ============ Обработка формы создания пользователя ============
    document.getElementById('newUserForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const saveButton = this.querySelector('button[type="submit"]');
        saveButton.disabled = true;
        saveButton.textContent = 'Adding...';

        clearFormErrors('newUserForm');

        const formData = {
            firstName: document.getElementById('newFirstName').value.trim(),
            lastName: document.getElementById('newLastName').value.trim(),
            age: parseInt(document.getElementById('newAge').value) || null,
            email: document.getElementById('newEmail').value.trim(),
            password: document.getElementById('newPassword').value.trim(),
            roles: Array.from(document.getElementById('newRole').selectedOptions).map(opt => ({ id: parseInt(opt.value) }))
        };

        try {
            const response = await fetchWithCsrf('/api/admin/users', {
                method: 'POST',
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                const result = await response.json();
                allUsers.push(result.user);
                renderUsersTable();
                this.reset();
                showAlert('success', result.message);
            } else if (response.status === 400) {
                const errors = await response.json();
                displayFormErrors('newUserForm', errors);
            }
        } catch (error) {
            console.error('Error creating user:', error);
            showAlert('danger', 'Ошибка сети при создании пользователя');
        } finally {
            saveButton.disabled = false;
            saveButton.textContent = 'Add new user';
        }
    });

    // ============ Обработка редактирования ============
    function handleEditClick() {
        const userId = parseInt(this.dataset.userId);
        const user = allUsers.find(u => u.id === userId);
        if (!user) return;

        document.getElementById('editId').value = user.id;
        document.getElementById('editFirstName').value = user.firstName;
        document.getElementById('editLastName').value = user.lastName;
        document.getElementById('editAge').value = user.age || '';
        document.getElementById('editEmail').value = user.email;
        document.getElementById('editPassword').value = '';

        const roleSelect = document.getElementById('editRole');
        Array.from(roleSelect.options).forEach(option => {
            option.selected = user.roles.some(role => role.id === parseInt(option.value));
        });

        clearFormErrors('editUserForm');

        const modal = new bootstrap.Modal(document.getElementById('editUserModal'));
        modal.show();
    }

    document.getElementById('saveEdit').addEventListener('click', async function() {
        const saveButton = this;
        saveButton.disabled = true;
        saveButton.textContent = 'Saving...';

        clearFormErrors('editUserForm');

        const userId = parseInt(document.getElementById('editId').value);
        const formData = {
            firstName: document.getElementById('editFirstName').value.trim(),
            lastName: document.getElementById('editLastName').value.trim(),
            age: parseInt(document.getElementById('editAge').value) || null,
            email: document.getElementById('editEmail').value.trim(),
            password: document.getElementById('editPassword').value.trim(),
            roles: Array.from(document.getElementById('editRole').selectedOptions).map(opt => ({ id: parseInt(opt.value) }))
        };

        try {
            const response = await fetchWithCsrf(`/api/admin/users/${userId}`, {
                method: 'PUT',
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                const result = await response.json();
                const index = allUsers.findIndex(u => u.id === userId);
                if (index !== -1) {
                    allUsers[index] = result.user;
                }
                renderUsersTable();

                const modal = bootstrap.Modal.getInstance(document.getElementById('editUserModal'));
                modal.hide();
                showAlert('success', result.message);
            } else if (response.status === 400) {
                const errors = await response.json();
                displayFormErrors('editUserForm', errors);
            }
        } catch (error) {
            console.error('Error updating user:', error);
            showAlert('danger', 'Ошибка сети при обновлении пользователя');
        } finally {
            saveButton.disabled = false;
            saveButton.textContent = 'Edit';
        }
    });

    // ============ Обработка удаления ============
    function handleDeleteClick() {
        const userId = parseInt(this.dataset.userId);
        const user = allUsers.find(u => u.id === userId);
        if (!user) return;

        document.getElementById('deleteId').value = user.id;
        document.getElementById('deleteFirstName').value = user.firstName;
        document.getElementById('deleteLastName').value = user.lastName;
        document.getElementById('deleteAge').value = user.age || '';
        document.getElementById('deleteEmail').value = user.email;

        const roleSelect = document.getElementById('deleteRole');
        roleSelect.innerHTML = user.roles.map(role => `
        <option value="${role.id}" selected>${role.role.replace('ROLE_', '')}</option>
    `).join('');

        const modal = new bootstrap.Modal(document.getElementById('deleteUserModal'));
        modal.show();
    }

    document.getElementById('deleteUser').addEventListener('click', async function() {
        const userId = parseInt(document.getElementById('deleteId').value);

        try {
            const response = await fetchWithCsrf(`/api/admin/users/${userId}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                const result = await response.json();
                allUsers = allUsers.filter(u => u.id !== userId);
                renderUsersTable();

                const modal = bootstrap.Modal.getInstance(document.getElementById('deleteUserModal'));
                modal.hide();
                showAlert('success', result.message);
            } else {
                showAlert('danger', 'Ошибка при удалении пользователя');
            }
        } catch (error) {
            console.error('Error deleting user:', error);
            showAlert('danger', 'Ошибка сети при удалении пользователя');
        }
    });

    // ============ Вспомогательные функции ============
    function clearFormErrors(formId) {
        const form = document.getElementById(formId);
        form.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
        form.querySelectorAll('[data-error]').forEach(el => el.textContent = '');
    }

    function displayFormErrors(formId, errors) {
        const form = document.getElementById(formId);

        const inputMap = {
            'firstName': `${formId === 'newUserForm' ? 'newFirstName' : 'editFirstName'}`,
            'lastName': `${formId === 'newUserForm' ? 'newLastName' : 'editLastName'}`,
            'age': `${formId === 'newUserForm' ? 'newAge' : 'editAge'}`,
            'email': `${formId === 'newUserForm' ? 'newEmail' : 'editEmail'}`,
            'password': `${formId === 'newUserForm' ? 'newPassword' : 'editPassword'}`,
            'roles': `${formId === 'newUserForm' ? 'newRole' : 'editRole'}`
        };

        for (const [field, message] of Object.entries(errors)) {
            const inputId = inputMap[field];
            if (inputId) {
                const input = document.getElementById(inputId);
                const errorDiv = input.closest('.mb-3')?.querySelector('[data-error]');

                if (input) input.classList.add('is-invalid');
                if (errorDiv) errorDiv.textContent = message;
            }
        }
    }

    function showAlert(type, message) {
        const alertContainer = document.createElement('div');
        alertContainer.className = `alert alert-${type} alert-dismissible fade show position-fixed top-0 end-0 m-3`;
        alertContainer.style.zIndex = '9999';
        alertContainer.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
        document.body.appendChild(alertContainer);

        setTimeout(() => {
            alertContainer.remove();
        }, 3000);
    }

    // ============ Инициализация ============
    document.addEventListener('DOMContentLoaded', loadInitialData);
</script>

</body>
</html>
