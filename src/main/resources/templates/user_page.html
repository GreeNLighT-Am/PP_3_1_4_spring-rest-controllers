<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <meta name="_csrf" th:content="${_csrf.token}"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <title>User page</title>
</head>
<body>

<!--Навбар-->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3" style="height: 45px;">
    <div class="d-flex align-items-center justify-content-start w-100" id="userInfo">
        <!-- Заполняется через JS -->
    </div>
    <div class="navbar-nav d-flex">
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit" class="nav-link" style="background: none; border: none; cursor: pointer;">
                Logout
            </button>
        </form>
    </div>
</nav>

<!--Основной контейнер-->
<div class="container-fluid">
    <div class="row vh-100">
        <div class="col-2 d-flex flex-column pt-3 px-0 mb-auto">
            <div class="d-flex flex-column">
                <a id="adminLink" class="nav-link flex-fill text-start rounded" href="/admin" style="display: none;">Admin</a>
                <a class="nav-link bg-primary text-white flex-fill text-start rounded">User</a>
            </div>
        </div>

        <div class="col-10 bg-light d-flex flex-column px-4">
            <h1 class="mb-3 mt-3">User information-page</h1>

            <div class="card">
                <h5 class="card-header d-flex align-items-center">About user</h5>
                <div class="card-body">
                    <table class="table card-body table-striped border-top">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                        </thead>
                        <tbody id="userTableBody">
                        <!-- Заполняется через JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

    async function loadUserData() {
        try {
            const response = await fetch('/api/user/current', {
                headers: {
                    [csrfHeader]: csrfToken
                }
            });

            if (response.ok) {
                const user = await response.json();
                renderUserInfo(user);
                renderUserTable(user);
                checkAdminRole(user);
            }
        } catch (error) {
            console.error('Error loading user data:', error);
        }
    }

    function renderUserInfo(user) {
        const userInfo = document.getElementById('userInfo');
        const roles = user.roles.map(role => role.role.replace('ROLE_', '')).join(', ');
        userInfo.innerHTML = `
        <span class="text-white me-1 fs-5 fw-bold">${user.email}</span>
        <span class="text-white me-1 fs-5">with roles:</span>
        <span class="text-white fs-5">${roles}</span>
    `;
    }

    function renderUserTable(user) {
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = `
        <tr>
            <td>${user.id}</td>
            <td>${user.firstName}</td>
            <td>${user.lastName}</td>
            <td>${user.age || ''}</td>
            <td>${user.email}</td>
            <td>${user.roles.map(role => role.role.replace('ROLE_', '')).join(', ')}</td>
        </tr>
    `;
    }

    function checkAdminRole(user) {
        const hasAdminRole = user.roles.some(role => role.role === 'ROLE_ADMIN');
        const adminLink = document.getElementById('adminLink');
        if (hasAdminRole) {
            adminLink.style.display = 'block';
        }
    }

    document.addEventListener('DOMContentLoaded', loadUserData);
</script>

</body>
</html>
